<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drivee Game</title>
  <script src="/pixi.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #game-container {
      position: relative;
      display: block;
    }

    canvas {
      display: block;
    }

    /* ── Overlays ── */
    .overlay {
      position: fixed;
      inset: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.82);
      z-index: 10;
    }

    .overlay-box {
      background: #1e1e1e;
      border: 2px solid #444;
      border-radius: 16px;
      padding: 36px 40px;
      text-align: center;
      color: #fff;
      font-family: Arial, sans-serif;
      min-width: 300px;
    }

    .overlay-box h1 {
      font-size: 2.4rem;
      color: #ff4444;
      margin-bottom: 8px;
      letter-spacing: 2px;
    }

    .overlay-box h2 {
      font-size: 1.8rem;
      color: #ff4444;
      margin-bottom: 4px;
    }

    .overlay-box h3 {
      font-size: 1rem;
      color: #aaa;
      margin: 16px 0 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .overlay-box p {
      color: #ccc;
      margin-bottom: 20px;
      font-size: 0.95rem;
    }

    #my-score-text {
      font-size: 1.5rem;
      color: #fff;
      margin: 8px 0 16px;
    }

    .overlay-box input[type="text"] {
      width: 100%;
      padding: 10px 14px;
      border-radius: 8px;
      border: 1px solid #555;
      background: #2a2a2a;
      color: #fff;
      font-size: 1rem;
      outline: none;
      margin-bottom: 16px;
    }

    .overlay-box input[type="text"]:focus {
      border-color: #ff4444;
    }

    .overlay-btn {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #ff4444;
      color: #fff;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .overlay-btn:hover { background: #e03333; }
    .overlay-btn:disabled { background: #666; cursor: default; }

    .overlay-btn-secondary {
      background: #333;
      margin-top: 8px;
    }
    .overlay-btn-secondary:hover { background: #444; }

    #lb-list {
      list-style: none;
      padding: 0;
      margin: 0 0 20px;
      text-align: left;
      max-height: 240px;
      overflow-y: auto;
    }

    #lb-list li {
      padding: 6px 10px;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
      color: #ddd;
    }

    #lb-list li:nth-child(odd) { background: #2a2a2a; }
    #lb-list li.me { color: #ffdd44; font-weight: bold; }
    #lb-list li .rank { color: #888; margin-right: 8px; }

    /* ── Onboarding ── */
    .onboarding-demo {
      display: flex;
      margin: 20px 0 0;
      border-radius: 10px 10px 0 0;
      overflow: hidden;
      border: 2px solid #444;
      border-bottom: none;
      height: 110px;
      position: relative;
    }

    .onboarding-half {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #252525;
      position: relative;
      gap: 5px;
    }

    #ob-left { border-right: 1px dashed #444; }

    .ob-arrow {
      font-size: 2rem;
      color: #ff4444;
      line-height: 1;
    }

    .ob-label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .ob-tap-ring {
      position: absolute;
      top: calc(50% - 22px);
      left: calc(50% - 22px);
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 2px solid rgba(255, 68, 68, 0.8);
      opacity: 0;
      pointer-events: none;
      animation: obTapRing 2s ease-out infinite;
    }

    #ob-left .ob-tap-ring  { animation-delay: 0s; }
    #ob-right .ob-tap-ring { animation-delay: 1s; }

    @keyframes obTapRing {
      0%   { opacity: 0.9; transform: scale(0.3); }
      80%  { opacity: 0.1; transform: scale(1.5); }
      100% { opacity: 0;   transform: scale(1.5); }
    }

    .ob-car-row {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #252525;
      border: 2px solid #444;
      border-top: 1px dashed #383838;
      border-radius: 0 0 10px 10px;
      padding: 6px 0 8px;
      margin-bottom: 16px;
      font-size: 1.8rem;
    }

    .ob-divider-line {
      display: none;
    }

    .ob-keyboard-hint {
      font-size: 0.8rem !important;
      color: #555 !important;
      margin-bottom: 16px !important;
      margin-top: -4px !important;
    }
  </style>
</head>
<body>
  <!-- Registration overlay -->
  <div id="reg-overlay" class="overlay">
    <div class="overlay-box">
      <h1>DRIVEE</h1>
      <p>Введите своё имя для начала игры</p>
      <input type="text" id="player-name" placeholder="Ваше имя" maxlength="50" autocomplete="off" />
      <button id="start-btn" class="overlay-btn">Начать игру</button>
    </div>
  </div>

  <!-- Onboarding overlay -->
  <div id="onboarding-overlay" class="overlay" style="display:none">
    <div class="overlay-box">
      <h1>КАК ИГРАТЬ</h1>
      <div class="onboarding-demo">
        <div class="onboarding-half" id="ob-left">
          <div class="ob-arrow">◀</div>
          <div class="ob-label">влево</div>
          <div class="ob-tap-ring"></div>
        </div>
        <div class="onboarding-half" id="ob-right">
          <div class="ob-arrow">▶</div>
          <div class="ob-label">вправо</div>
          <div class="ob-tap-ring"></div>
        </div>
      </div>
      <div class="ob-car-row">🚗</div>
      <p>Нажимайте на <strong style="color:#fff">левую</strong> или <strong style="color:#fff">правую</strong> часть экрана, чтобы менять полосу и объезжать машины</p>
      <p class="ob-keyboard-hint" id="ob-keyboard-hint">На компьютере: стрелки ← →</p>
      <button id="onboarding-btn" class="overlay-btn">Понятно!</button>
    </div>
  </div>

  <!-- Leaderboard overlay (shown on game over) -->
  <div id="lb-overlay" class="overlay" style="display:none">
    <div class="overlay-box">
      <h2>Game Over</h2>
      <div id="my-score-text"></div>
      <h3>Таблица лидеров</h3>
      <ol id="lb-list"></ol>
      <button id="restart-btn" class="overlay-btn">Играть снова</button>
      <button id="new-user-btn" class="overlay-btn overlay-btn-secondary">Новый пользователь</button>
    </div>
  </div>

  <div id="game-container"></div>

  <script>
    const SPRITE_PLAYER  = '/sprites/car-player-green.png';
    const SPRITE_ENEMY   = '/sprites/car-enemy.png';
    const SPRITE_FRIENDLY = '/sprites/car-friendly.png';
    const SPRITE_CROSS   = '/sprites/car-cross.png';
    const SPRITE_ENV_TREE = '/sprites/tree-2.png';
    const SPRITE_ENV_BUSH = '/sprites/bush.png';
    const SPRITE_ENV_ROCK = '/sprites/rock.png';
    const GAME_WIDTH  = 360;
    const GAME_HEIGHT = 600;

    const LANE_COUNT       = 5;
    const ROAD_MARGIN      = 30;
    const LANE_WIDTH       = (GAME_WIDTH - ROAD_MARGIN * 2) / LANE_COUNT;  // 60px
    const OBJ_W            = 40;
    const OBJ_H            = 60;
    const PLAYER_Y_OFFSET  = 200;   // отступ от низа

    function laneCenterX(lane) {
      return ROAD_MARGIN + LANE_WIDTH * lane + LANE_WIDTH / 2;
    }

    // ── API helpers ───────────────────────────────────────────────────────────
    let currentPlayer = null;

    async function apiRegister(name) {
      const res = await fetch('/api/players', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name }),
      });
      return res.json();
    }

    async function apiSaveScore(playerId, score) {
      await fetch('/api/scores', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ player_id: playerId, score }),
      });
    }

    async function apiFetchLeaderboard() {
      const res = await fetch('/api/leaderboard');
      return res.json();
    }

    // ── Onboarding ────────────────────────────────────────────────────────────
    function maybeShowOnboarding(callback) {
      if (localStorage.getItem('drivee_onboarding_seen')) {
        callback();
        return;
      }
      const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
      if (!isTouch) {
        document.getElementById('ob-keyboard-hint').style.display = 'block';
      } else {
        document.getElementById('ob-keyboard-hint').style.display = 'none';
      }
      document.getElementById('onboarding-overlay').style.display = 'flex';
      document.getElementById('onboarding-btn').addEventListener('click', () => {
        localStorage.setItem('drivee_onboarding_seen', '1');
        document.getElementById('onboarding-overlay').style.display = 'none';
        callback();
      }, { once: true });
    }

    // ── Registration form ─────────────────────────────────────────────────────
    async function startWithPlayer(player) {
      currentPlayer = player;
      localStorage.setItem('drivee_player', JSON.stringify(player));
      document.getElementById('reg-overlay').style.display = 'none';
      maybeShowOnboarding(initGame);
    }

    document.getElementById('start-btn').addEventListener('click', async () => {
      const name = document.getElementById('player-name').value.trim();
      if (!name) return;
      const btn = document.getElementById('start-btn');
      btn.disabled = true;
      btn.textContent = '...';
      const player = await apiRegister(name);
      startWithPlayer(player);
    });

    document.getElementById('player-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('start-btn').click();
    });

    document.getElementById('restart-btn').addEventListener('click', () => {
      location.reload();
    });

    document.getElementById('new-user-btn').addEventListener('click', () => {
      localStorage.removeItem('drivee_player');
      localStorage.removeItem('drivee_onboarding_seen');
      location.reload();
    });

    // Auto-login if name was saved before
    const saved = localStorage.getItem('drivee_player');
    if (saved) {
      startWithPlayer(JSON.parse(saved));
    }

    // ── Game ──────────────────────────────────────────────────────────────────
    async function initGame() {
      const app = new PIXI.Application();

      await app.init({
        width: GAME_WIDTH,
        height: GAME_HEIGHT,
        backgroundColor: 0x444444,
        antialias: true,
        resolution: window.devicePixelRatio || 1,
        autoDensity: true,
      });

      document.getElementById('game-container').appendChild(app.canvas);

      // ── Загрузка спрайтов ─────────────────────────────────────────────────────
      await PIXI.Assets.load([
        { alias: 'car-player',   src: SPRITE_PLAYER },
        { alias: 'car-enemy',    src: SPRITE_ENEMY },
        { alias: 'car-friendly', src: SPRITE_FRIENDLY },
        { alias: 'car-cross',    src: SPRITE_CROSS },
        { alias: 'env-tree',     src: SPRITE_ENV_TREE },
        { alias: 'env-bush',     src: SPRITE_ENV_BUSH },
        { alias: 'env-rock',     src: SPRITE_ENV_ROCK },
      ]);

      function makeCarSprite(alias, w, h, rotation = 0) {
        const sprite = new PIXI.Sprite(PIXI.Assets.get(alias));
        sprite.anchor.set(0.5);
        sprite.width    = w;
        sprite.height   = h;
        sprite.rotation = rotation;
        return sprite;
      }

      // ── Масштабирование ──────────────────────────────────────────────────────
      function resize() {
        const scale = Math.min(window.innerWidth / GAME_WIDTH, window.innerHeight / GAME_HEIGHT);
        const w = Math.floor(GAME_WIDTH  * scale);
        const h = Math.floor(GAME_HEIGHT * scale);
        app.canvas.style.width  = w + 'px';
        app.canvas.style.height = h + 'px';
        const wrap = document.getElementById('game-container');
        wrap.style.width  = w + 'px';
        wrap.style.height = h + 'px';
      }
      resize();
      window.addEventListener('resize', resize);

      // ── Слои ─────────────────────────────────────────────────────────────────
      const roadLayer         = new PIXI.Container();
      const decorLayer        = new PIXI.Container(); // декорации обочины
      const verticalLayer     = new PIXI.Container(); // вертикальные машины (под перекрёстком)
      const intersectionLayer = new PIXI.Container(); // перекрёстки + горизонтальные машины
      const playerLayer       = new PIXI.Container();
      const uiLayer           = new PIXI.Container();

      app.stage.addChild(roadLayer, decorLayer, verticalLayer, intersectionLayer, playerLayer, uiLayer);

      // ── Дорога ───────────────────────────────────────────────────────────────
      const road = new PIXI.Graphics();
      // трава по бокам
      road.rect(0, 0, GAME_WIDTH, GAME_HEIGHT).fill(0x2d7a2d);
      // тёмно-серое дорожное покрытие
      road.rect(ROAD_MARGIN, 0, GAME_WIDTH - ROAD_MARGIN * 2, GAME_HEIGHT).fill(0x333333);
      // разметка полос
      for (let i = 1; i < LANE_COUNT; i++) {
        const x = ROAD_MARGIN + LANE_WIDTH * i;
        road
          .setStrokeStyle({ width: 2, color: 0xffffff, alpha: 0.25 })
          .moveTo(x, 0)
          .lineTo(x, GAME_HEIGHT)
          .stroke();
      }
      // бордюры дороги
      road
        .setStrokeStyle({ width: 4, color: 0xffffff, alpha: 0.6 })
        .moveTo(ROAD_MARGIN, 0).lineTo(ROAD_MARGIN, GAME_HEIGHT).stroke()
        .moveTo(GAME_WIDTH - ROAD_MARGIN, 0).lineTo(GAME_WIDTH - ROAD_MARGIN, GAME_HEIGHT).stroke();
      roadLayer.addChild(road);

      // ── Декорации обочины ────────────────────────────────────────────────────
      const decorations = [];
      const DECOR_ALIASES = ['env-tree', 'env-bush', 'env-rock'];
      const DECOR_SIZE    = 24;

      function spawnDecoration() {
        const alias  = DECOR_ALIASES[Math.floor(Math.random() * DECOR_ALIASES.length)];
        const sprite = new PIXI.Sprite(PIXI.Assets.get(alias));
        sprite.anchor.set(0.5);
        sprite.width  = DECOR_SIZE;
        sprite.height = DECOR_SIZE;
        sprite.x = Math.random() < 0.5 ? ROAD_MARGIN / 2 : GAME_WIDTH - ROAD_MARGIN / 2;
        sprite.y = -DECOR_SIZE / 2;
        decorLayer.addChild(sprite);
        decorations.push(sprite);
      }

      // предзаполняем обочину
      for (let i = 0; i < 14; i++) {
        spawnDecoration();
        decorations[decorations.length - 1].y = Math.random() * GAME_HEIGHT;
      }

      setInterval(() => { spawnDecoration(); spawnDecoration(); }, 700);

      // ── Игрок ─────────────────────────────────────────────────────────────────
      let playerLane = 2;   // стартовая полоса (0-4)
      const playerGfx = makeCarSprite('car-player', OBJ_W, OBJ_H);
      playerGfx.x = laneCenterX(playerLane);
      playerGfx.y = GAME_HEIGHT - PLAYER_Y_OFFSET;
      playerLayer.addChild(playerGfx);

      // ── Поворотники ───────────────────────────────────────────────────────────
      let blinkerDir   = 0;    // -1 влево, 0 нет, 1 вправо
      let blinkerTimer = 0;    // оставшееся время (сек)
      let blinkerPhase = 0;    // счётчик фазы мигания
      const BLINKER_DURATION = 0.5;
      const BLINKER_PERIOD   = 0.18;

      const blinkerL = new PIXI.Graphics();
      const blinkerR = new PIXI.Graphics();
      playerLayer.addChild(blinkerL);
      playerLayer.addChild(blinkerR);

      function redrawBlinker(gfx, lit) {
        gfx.clear();
        if (lit) {
          // внешнее свечение
          gfx.roundRect(-7, -5, 14, 10, 5).fill({ color: 0xff8800, alpha: 0.35 });
          // сам огонь
          gfx.roundRect(-5, -3, 10, 6, 2).fill(0xffaa00);
          // блик
          gfx.roundRect(-4, -2, 4, 2, 1).fill({ color: 0xffffcc, alpha: 0.7 });
        }
      }

      function startBlinker(dir) {
        blinkerDir   = dir;
        blinkerTimer = BLINKER_DURATION;
        blinkerPhase = 0;   // начинаем с «включено»
      }

      // ── Сложность ─────────────────────────────────────────────────────────────
      const difficulty = {
        speed:         3,     // множитель скорости (px/s = 100 * speed)
        spawnInterval: 2000,  // мс между спавнами
        carsPerWave:   1,     // машин за одну волну
      };

      const SPEED_STEP          = 0.5;   // +speed каждые 10 очков
      const SPAWN_STEP          = 200;   // -мс каждые 15 очков
      const SPAWN_INTERVAL_MIN  = 500;   // нижний предел интервала
      const CARS_STEP_SCORE     = 20;    // каждые N очков +1 машина в волне
      const CARS_MAX            = 3;     // максимум машин за волну

      const INTERSECTION_TRIGGER = 5;  // каждые N очков — перекрёсток
      const INTERSECTION_H       = 90;  // высота полосы перекрёстка
      const H_CAR_W              = 62;  // ширина горизонтальной машины
      const H_CAR_H              = 34;  // высота горизонтальной машины
      const H_CAR_SPEED          = 320; // px/s по горизонтали
      const H_CAR_COUNT          = 1;   // машин в каждом ряду

      const ENEMY_BLINK_DURATION = 0.9;   // сек мигания перед сменой полосы
      const ENEMY_BLINK_PERIOD   = 0.17;  // период вспышки (сек)
      const ENEMY_LANE_SPEED     = 110;   // px/s боковое движение врага
      const ENEMY_DECIDE_MIN     = 2200;  // мин. задержка между решениями (мс)
      const ENEMY_DECIDE_MAX     = 4500;  // макс. задержка (мс)
      const ENEMY_LANE_START_SCORE = 15;  // с какого счёта враги меняют полосы

      // ── Счёт ──────────────────────────────────────────────────────────────────
      let score = 0;
      const scoreText = new PIXI.Text({
        text: 'Счёт: 0',
        style: new PIXI.TextStyle({
          fontFamily: 'Arial',
          fontSize: 24,
          fontWeight: 'bold',
          fill: 0xffffff,
          stroke: { color: 0x000000, width: 4 },
        }),
      });
      scoreText.x = 12;
      scoreText.y = 12;
      uiLayer.addChild(scoreText);

      // ── Препятствия ───────────────────────────────────────────────────────────
      const obstacles = [];

      function createObstacleOnLane(lane) {
        const baseSpeed = difficulty.speed * 100;
        // индивидуальный множитель скорости: от 0.7× до 1.4× базовой
        const speedMult = 0.7 + Math.random() * 0.7;
        const speed     = baseSpeed * speedMult;

        // встречные едут вниз → спрайт повёрнут на 180°
        const gfx = makeCarSprite('car-enemy', OBJ_W, OBJ_H, Math.PI);
        gfx.x = laneCenterX(lane);
        gfx.y = -OBJ_H / 2;
        gfx._speed = speed;
        // состояние смены полосы
        gfx._lane         = lane;
        gfx._targetLane   = lane;
        gfx._targetLaneX  = gfx.x;
        gfx._blinkerDir   = 0;
        gfx._blinkerTimer = 0;
        gfx._blinkerPhase = 0;
        gfx._laneMoving   = false;
        gfx._nextDecide   = Date.now() + ENEMY_DECIDE_MIN + Math.random() * (ENEMY_DECIDE_MAX - ENEMY_DECIDE_MIN);
        // поворотники врага
        const ebl = new PIXI.Graphics();
        const ebr = new PIXI.Graphics();
        verticalLayer.addChild(ebl);
        verticalLayer.addChild(ebr);
        gfx._ebl = ebl;
        gfx._ebr = ebr;
        verticalLayer.addChild(gfx);
        obstacles.push(gfx);
      }

      function laneOf(obj) {
        return Math.round((obj.x - ROAD_MARGIN - LANE_WIDTH / 2) / LANE_WIDTH);
      }

      function spawnWave() {
        if (obstacles.length >= 3) return;
        // выбираем случайные уникальные полосы для волны,
        // исключая полосы с активными попутками и встречными
        const busyLanes = new Set([
          ...tailgaters.map(laneOf),
          ...obstacles.map(laneOf),
        ]);
        const count = Math.min(difficulty.carsPerWave, 3 - obstacles.length);
        const lanes = Array.from({ length: LANE_COUNT }, (_, i) => i)
          .filter(l => !busyLanes.has(l));
        for (let i = lanes.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [lanes[i], lanes[j]] = [lanes[j], lanes[i]];
        }
        lanes.slice(0, count).forEach(createObstacleOnLane);
      }

      // ── Попутные машины (снизу вверх) ─────────────────────────────────────────
      const tailgaters = [];

      function createTailgater() {
        // исключаем полосы с попутками и встречными
        const occupiedLanes = new Set([
          ...tailgaters.map(laneOf),
          ...obstacles.map(laneOf),
        ]);
        const freeLanes = Array.from({ length: LANE_COUNT }, (_, i) => i)
          .filter(l => !occupiedLanes.has(l));
        if (freeLanes.length === 0) return;

        const lane = freeLanes[Math.floor(Math.random() * freeLanes.length)];
        const speed = difficulty.speed * 65 + 10 + Math.random() * 10;

        // попутки едут вверх (как игрок) → спрайт без поворота
        const gfx = makeCarSprite('car-friendly', OBJ_W, OBJ_H);
        gfx.x = laneCenterX(lane);
        gfx.y = GAME_HEIGHT + OBJ_H / 2;
        gfx._speed = speed;
        verticalLayer.addChild(gfx);
        tailgaters.push(gfx);
      }

      let tailgaterIntervalId = null;

      function restartTailgaterInterval() {
        clearInterval(tailgaterIntervalId);
        // попутки появляются чуть реже встречных
        tailgaterIntervalId = setInterval(createTailgater, difficulty.spawnInterval * 1.5);
      }

      // попутки запустятся позже, с 10-го очка

      // ── Перекрёстки ───────────────────────────────────────────────────────────
      const intersections = [];

      function spawnIntersection() {
        const inter = new PIXI.Container();
        inter.x = 0;
        inter.y = -INTERSECTION_H;
        inter._scrollSpeed = difficulty.speed * 100;
        inter._hcars = [];

        // фон полосы перекрёстка
        const bg = new PIXI.Graphics();
        bg.rect(0, 0, GAME_WIDTH, INTERSECTION_H).fill(0x4a4a1a);
        // жёлтые границы
        bg.setStrokeStyle({ width: 3, color: 0xffee00, alpha: 0.9 })
          .moveTo(0, 0).lineTo(GAME_WIDTH, 0).stroke()
          .moveTo(0, INTERSECTION_H).lineTo(GAME_WIDTH, INTERSECTION_H).stroke();
        // пунктирная центральная линия
        for (let x = 4; x < GAME_WIDTH; x += 22) {
          bg.rect(x, INTERSECTION_H / 2 - 2, 13, 4).fill({ color: 0xffee00, alpha: 0.4 });
        }
        inter.addChild(bg);

        const row0y = Math.round(INTERSECTION_H * 0.28);  // → слева направо
        const row1y = Math.round(INTERSECTION_H * 0.72);  // ← справа налево

        for (let i = 0; i < H_CAR_COUNT; i++) {
          // оранжевые → слева направо (поворот +90°)
          const carR = makeCarSprite('car-enemy', H_CAR_H, H_CAR_W, Math.PI / 2);
          carR.x = -(H_CAR_W / 2) - i * (H_CAR_W + 28);
          carR.y = row0y;
          carR._dir = 1;
          inter.addChild(carR);
          inter._hcars.push(carR);

          // фиолетовые ← справа налево (поворот −90°)
          const carL = makeCarSprite('car-cross', H_CAR_H, H_CAR_W, -Math.PI / 2);
          carL.x = GAME_WIDTH + H_CAR_W / 2 + i * (H_CAR_W + 28);
          carL.y = row1y;
          carL._dir = -1;
          inter.addChild(carL);
          inter._hcars.push(carL);
        }

        intersectionLayer.addChild(inter);
        intersections.push(inter);
      }

      // ── Спавн через setInterval (пересоздаётся при смене интервала) ───────────
      let spawnIntervalId = null;

      function restartSpawnInterval() {
        clearInterval(spawnIntervalId);
        spawnIntervalId = setInterval(spawnWave, difficulty.spawnInterval);
        restartTailgaterInterval();
      }

      restartSpawnInterval();

      // ── Управление: тап ───────────────────────────────────────────────────────
      app.canvas.addEventListener('pointerdown', (e) => {
        if (gameOver) return;
        const rect   = app.canvas.getBoundingClientRect();
        const scaleX = GAME_WIDTH / rect.width;
        const tapX   = (e.clientX - rect.left) * scaleX;

        if (tapX < GAME_WIDTH / 2) {
          if (playerLane > 0) { playerLane--; startBlinker(-1); }
        } else {
          if (playerLane < LANE_COUNT - 1) { playerLane++; startBlinker(1); }
        }
      });

      // ── Управление: клавиатура ─────────────────────────────────────────────────
      window.addEventListener('keydown', (e) => {
        if (gameOver) return;
        if (e.key === 'ArrowLeft') {
          if (playerLane > 0) { playerLane--; startBlinker(-1); }
        } else if (e.key === 'ArrowRight') {
          if (playerLane < LANE_COUNT - 1) { playerLane++; startBlinker(1); }
        }
      });

      // ── AABB коллизия ─────────────────────────────────────────────────────────
      function intersects(ax, ay, bx, by) {
        return (
          Math.abs(ax - bx) < OBJ_W &&
          Math.abs(ay - by) < OBJ_H
        );
      }

      // ── Game Over ─────────────────────────────────────────────────────────────
      let gameOver = false;

      function triggerGameOver() {
        gameOver = true;
        clearInterval(spawnIntervalId);
        clearInterval(tailgaterIntervalId);
        app.ticker.stop();
        showGameOver();
      }

      async function showGameOver() {
        // Save score and show HTML leaderboard overlay
        if (currentPlayer) {
          await apiSaveScore(currentPlayer.id, score);
          const lb = await apiFetchLeaderboard();
          document.getElementById('my-score-text').textContent = `Ваш счёт: ${score}`;
          const list = document.getElementById('lb-list');
          list.innerHTML = lb.map((r, i) => {
            const isCurrent = r.name === currentPlayer.name;
            return `<li class="${isCurrent ? 'me' : ''}">
              <span><span class="rank">${i + 1}.</span>${r.name}</span>
              <span>${r.best_score}</span>
            </li>`;
          }).join('');
          document.getElementById('lb-overlay').style.display = 'flex';
        }
      }

      // ── Игровой цикл ──────────────────────────────────────────────────────────
      let playerX = laneCenterX(playerLane);

      app.ticker.add((ticker) => {
        const dt = ticker.deltaMS / 1000;  // дельта в секундах

        // плавное движение игрока к целевой полосе
        const targetX = laneCenterX(playerLane);
        playerX += (targetX - playerX) * Math.min(1, dt * 12);
        playerGfx.x = playerX;

        // ── обновление поворотников ───────────────────────────────────────────
        if (blinkerDir !== 0) {
          blinkerTimer -= dt;
          blinkerPhase += dt;
          if (blinkerTimer <= 0) { blinkerDir = 0; blinkerPhase = 0; }
        }
        const blinkOn  = blinkerDir !== 0 && Math.floor(blinkerPhase / BLINKER_PERIOD) % 2 === 0;
        const blinkerY = playerGfx.y - OBJ_H / 2 + 6;
        blinkerL.x = playerGfx.x - OBJ_W / 2 + 5;
        blinkerL.y = blinkerY;
        blinkerR.x = playerGfx.x + OBJ_W / 2 - 5;
        blinkerR.y = blinkerY;
        redrawBlinker(blinkerL, blinkOn && blinkerDir === -1);
        redrawBlinker(blinkerR, blinkOn && blinkerDir ===  1);

        // обновление декораций обочины
        for (let i = decorations.length - 1; i >= 0; i--) {
          const d = decorations[i];
          d.y += difficulty.speed * 50 * dt;
          if (d.y > GAME_HEIGHT + DECOR_SIZE / 2) {
            decorLayer.removeChild(d);
            d.destroy();
            decorations.splice(i, 1);
          }
        }

        // обновление перекрёстков
        for (let i = intersections.length - 1; i >= 0; i--) {
          const inter = intersections[i];
          inter.y += inter._scrollSpeed * dt;

          for (const car of inter._hcars) {
            car.x += car._dir * H_CAR_SPEED * dt;
          }

          // коллизия горизонтальных машин с игроком
          for (const car of inter._hcars) {
            const worldY = inter.y + car.y;
            if (
              Math.abs(playerGfx.x - car.x) < (OBJ_W + H_CAR_W) / 2 &&
              Math.abs(playerGfx.y - worldY) < (OBJ_H + H_CAR_H) / 2
            ) {
              triggerGameOver();
              return;
            }
          }

          if (inter.y > GAME_HEIGHT + INTERSECTION_H) {
            intersectionLayer.removeChild(inter);
            inter.destroy();
            intersections.splice(i, 1);
          }
        }

        // обновление попутных машин (движутся вверх)
        for (let i = tailgaters.length - 1; i >= 0; i--) {
          const t = tailgaters[i];
          t.y -= t._speed * dt;

          // стоп перед перекрёстком снизу
          for (const inter of intersections) {
            const interBottom = inter.y + INTERSECTION_H;
            if (t.y - OBJ_H / 2 < interBottom && t.y + OBJ_H / 2 > inter.y) {
              t.y = interBottom + OBJ_H / 2;
            }
          }

          if (t.y < -OBJ_H / 2) {
            verticalLayer.removeChild(t);
            t.destroy();
            tailgaters.splice(i, 1);
            continue;
          }

          if (intersects(playerGfx.x, playerGfx.y, t.x, t.y)) {
            triggerGameOver();
            return;
          }
        }

        // обновление препятствий
        for (let i = obstacles.length - 1; i >= 0; i--) {
          const obs = obstacles[i];
          obs.y += obs._speed * dt;

          // стоп перед перекрёстком сверху
          for (const inter of intersections) {
            if (obs.y + OBJ_H / 2 > inter.y && obs.y - OBJ_H / 2 < inter.y + INTERSECTION_H) {
              obs.y = inter.y - OBJ_H / 2;
            }
          }

          // ── смена полосы врагом (с ENEMY_LANE_START_SCORE очков) ─────────────
          if (score >= ENEMY_LANE_START_SCORE) {
            const now = Date.now();

            // принять решение о смене полосы
            if (!obs._laneMoving && obs._blinkerDir === 0 && now >= obs._nextDecide) {
              const dirs = [];
              if (obs._lane > 0)              dirs.push(-1);
              if (obs._lane < LANE_COUNT - 1) dirs.push(1);
              if (dirs.length > 0 && Math.random() < 0.55) {
                const dir = dirs[Math.floor(Math.random() * dirs.length)];
                const tl  = obs._lane + dir;
                // проверяем: нет ли другого врага рядом в целевой полосе
                const busy = obstacles.some(o =>
                  o !== obs && o._lane === tl && Math.abs(o.y - obs.y) < OBJ_H * 2.5
                );
                if (!busy) {
                  obs._blinkerDir   = dir;
                  obs._blinkerTimer = ENEMY_BLINK_DURATION;
                  obs._blinkerPhase = 0;
                  obs._targetLane   = tl;
                  obs._targetLaneX  = laneCenterX(tl);
                }
              }
              obs._nextDecide = now + ENEMY_DECIDE_MIN + Math.random() * (ENEMY_DECIDE_MAX - ENEMY_DECIDE_MIN);
            }

            // отсчёт мигания → запуск движения
            if (obs._blinkerDir !== 0 && !obs._laneMoving) {
              obs._blinkerTimer -= dt;
              obs._blinkerPhase += dt;
              if (obs._blinkerTimer <= 0) {
                obs._laneMoving = true;
              }
            }

            // боковое движение к целевой полосе
            if (obs._laneMoving) {
              obs._blinkerPhase += dt;  // продолжаем мигать при движении
              const diff = obs._targetLaneX - obs.x;
              const step = Math.sign(diff) * ENEMY_LANE_SPEED * dt;
              if (Math.abs(diff) <= Math.abs(step) + 0.5) {
                // добрались до цели
                obs.x           = obs._targetLaneX;
                obs._lane       = obs._targetLane;
                obs._laneMoving   = false;
                obs._blinkerDir   = 0;
                obs._blinkerPhase = 0;
              } else {
                const nextX = obs.x + step;
                // столкновение с другим врагом → стоп на месте
                const hit = obstacles.some(o =>
                  o !== obs &&
                  Math.abs(nextX - o.x) < OBJ_W * 0.85 &&
                  Math.abs(obs.y  - o.y) < OBJ_H
                );
                if (hit) {
                  // фиксируемся на ближайшей полосе
                  const snapped = Math.round((obs.x - ROAD_MARGIN - LANE_WIDTH / 2) / LANE_WIDTH);
                  obs._lane       = Math.max(0, Math.min(LANE_COUNT - 1, snapped));
                  obs._laneMoving   = false;
                  obs._blinkerDir   = 0;
                  obs._blinkerPhase = 0;
                } else {
                  obs.x = nextX;
                }
              }
            }

            // отрисовка поворотников врага (фары внизу — машина едет на игрока)
            const eBlinkOn = obs._blinkerDir !== 0 &&
                             Math.floor(obs._blinkerPhase / ENEMY_BLINK_PERIOD) % 2 === 0;
            const eFrontY  = obs.y + OBJ_H / 2 - 6;
            obs._ebl.x = obs.x - OBJ_W / 2 + 5;  obs._ebl.y = eFrontY;
            obs._ebr.x = obs.x + OBJ_W / 2 - 5;  obs._ebr.y = eFrontY;
            redrawBlinker(obs._ebl, eBlinkOn && obs._blinkerDir === -1);
            redrawBlinker(obs._ebr, eBlinkOn && obs._blinkerDir ===  1);
          }

          // препятствие покинуло экран → +1 очко
          if (obs.y > GAME_HEIGHT + OBJ_H / 2) {
            score++;
            scoreText.text = `Счёт: ${score}`;

            if (score === 10) restartTailgaterInterval();
            if (score % 10 === 0) difficulty.speed += SPEED_STEP;
            if (score % 15 === 0) {
              const next = difficulty.spawnInterval - SPAWN_STEP;
              difficulty.spawnInterval = Math.max(SPAWN_INTERVAL_MIN, next);
              restartSpawnInterval();
            }
            if (score % CARS_STEP_SCORE === 0) {
              difficulty.carsPerWave = Math.min(CARS_MAX, difficulty.carsPerWave + 1);
            }
            if (score % INTERSECTION_TRIGGER === 0) spawnIntersection();

            obs._ebl.destroy();
            obs._ebr.destroy();
            verticalLayer.removeChild(obs);
            obs.destroy();
            obstacles.splice(i, 1);
            continue;
          }

          // проверка столкновения с игроком
          if (intersects(playerGfx.x, playerGfx.y, obs.x, obs.y)) {
            triggerGameOver();
            return;
          }
        }
      });

    }
  </script>
